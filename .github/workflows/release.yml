# Publishes zips for a tag. Use this when:
# - Someone pushed a tag from git with a PAT (then this workflow runs on tag push), or
# - You need to (re)publish artifacts for an existing tag: Actions → Release → Run workflow.
#
# Automated merges use "Version bump on merge" (release-on-merge.yml), which publishes
# in the same run because GITHUB_TOKEN tag pushes do not trigger this workflow.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - run: npx playwright install chromium --with-deps

      - run: npm run test:ui
        env:
          PW_EXTENSION_HEADLESS: "1"

      - name: Package zips
        run: |
          (cd dist-chrome && zip -r ../youtube-vertical-chrome.zip .)
          (cd dist-firefox && zip -r ../youtube-vertical-firefox.zip .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            youtube-vertical-chrome.zip
            youtube-vertical-firefox.zip
          generate_release_notes: true
